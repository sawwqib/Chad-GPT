<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChadGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        /* --- DARK MODE WITH SIDEBAR COLLAPSED BY DEFAULT (HAMBURGER) --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0f0f10;
            --bg-sidebar: #1a1a1c;
            --bg-surface: #202124;
            --bg-input: #2a2b2e;
            --border-dark: #3c3e44;
            --text-primary: #efefef;
            --text-secondary: #abafba;
            --text-muted: #7f8490;
            --accent: #10a37f;
            --accent-hover: #0e8f6f;
            --accent-soft: #1a3a33;
            --danger: #f28b82;
            --danger-bg: #442c2c;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow: 0 4px 20px rgba(0,0,0,0.5);
            --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
            --sidebar-width: 280px;
            --sidebar-collapsed-width: 0px;
        }

        body {
            font-family: var(--font-sans);
            background: var(--bg-dark);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: row;
            overflow: hidden;
            font-weight: 400;
            line-height: 1.5;
        }

        /* --- SIDEBAR (collapsible) - collapsed by default --- */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-dark);
            display: flex;
            flex-direction: column;
            padding: 1.2rem 0.8rem;
            overflow-y: auto;
            flex-shrink: 0;
            transition: width 0.25s ease-in-out, padding 0.25s ease-in-out, opacity 0.2s;
            white-space: nowrap;
        }

        .sidebar.collapsed {
            width: var(--sidebar-collapsed-width);
            padding: 1.2rem 0;
            opacity: 0;
            overflow: hidden;
            border-right: none;
        }

        .sidebar-header {
            padding: 0 0.6rem 1rem 0.6rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border-dark);
        }

        .sidebar-header h3 {
            font-weight: 600;
            font-size: 1.2rem;
            color: var(--text-primary);
            letter-spacing: -0.2px;
        }

        .new-chat-btn {
            background: var(--accent);
            border: none;
            color: white;
            border-radius: 30px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.15s;
            border: 1px solid var(--accent-hover);
        }

        .new-chat-btn:hover {
            background: var(--accent-hover);
        }

        .history-list {
            flex: 1;
            margin-top: 1.2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            padding-right: 0.2rem;
        }

        .history-item {
            background: var(--bg-surface);
            border: 1px solid var(--border-dark);
            border-radius: var(--radius-md);
            padding: 0.9rem 1rem;
            transition: 0.1s;
            cursor: pointer;
        }

        .history-item:hover {
            background: #2c2d32;
            border-color: var(--accent);
        }

        .history-title {
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 0.25rem;
        }

        .history-meta {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .delete-chat-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            padding: 0.1rem 0.3rem;
            border-radius: 12px;
        }

        .delete-chat-btn:hover {
            background: var(--danger-bg);
            color: var(--danger);
        }

        .history-empty {
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
            padding: 2rem 1rem;
            background: var(--bg-surface);
            border-radius: var(--radius-md);
        }

        /* --- MAIN CHAT AREA --- */
        .main-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-dark);
        }

        .chat-header {
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border-dark);
            background: var(--bg-sidebar);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .chat-header h2 {
            font-weight: 600;
            font-size: 1.3rem;
            color: var(--text-primary);
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .hamburger {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            width: 24px;
            height: 18px;
            cursor: pointer;
            margin-right: 0.5rem;
        }

        .hamburger span {
            width: 100%;
            height: 2px;
            background: var(--text-primary);
            border-radius: 3px;
            transition: 0.2s;
        }

        .mode-switch {
            display: flex;
            gap: 0.5rem;
            background: var(--bg-input);
            padding: 0.3rem;
            border-radius: 40px;
            border: 1px solid var(--border-dark);
        }

        .mode-btn {
            border: none;
            background: transparent;
            padding: 0.5rem 1.6rem;
            border-radius: 30px;
            font-weight: 500;
            font-size: 0.9rem;
            color: var(--text-secondary);
            cursor: pointer;
            transition: 0.15s;
        }

        .mode-btn.active {
            background: var(--bg-surface);
            color: var(--accent);
            border: 0.5px solid var(--border-dark);
            font-weight: 600;
        }

        .conversation {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }

        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
        }

        .user-message {
            align-self: flex-end;
        }

        .assistant-message {
            align-self: flex-start;
        }

        .bubble {
            padding: 0.9rem 1.4rem;
            border-radius: 22px;
            background: var(--bg-surface);
            color: var(--text-primary);
            line-height: 1.5;
            font-size: 0.98rem;
            border: 1px solid var(--border-dark);
            word-break: break-word;
        }

        .user-message .bubble {
            background: var(--accent);
            color: white;
            border: none;
            border-bottom-right-radius: 6px;
        }

        .assistant-message .bubble {
            background: var(--bg-surface);
            border-bottom-left-radius: 6px;
        }

        .audio-attachment {
            margin-top: 0.5rem;
            background: var(--bg-input);
            border-radius: 20px;
            padding: 0.5rem;
        }

        audio {
            width: 100%;
            height: 38px;
            filter: invert(0.9) hue-rotate(180deg);
        }

        .input-row {
            padding: 1.2rem 2rem 1.5rem 2rem;
            background: var(--bg-dark);
            border-top: 1px solid var(--border-dark);
        }

        .input-container {
            display: flex;
            gap: 0.8rem;
            background: var(--bg-input);
            border: 1px solid var(--border-dark);
            border-radius: 40px;
            padding: 0.4rem 0.4rem 0.4rem 1.5rem;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .input-container textarea {
            flex: 1;
            border: none;
            background: transparent;
            padding: 0.8rem 0;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            max-height: 120px;
            outline: none;
            color: var(--text-primary);
        }

        .input-container textarea::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            flex-shrink: 0;
        }

        .send-btn:hover:not(:disabled) {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .voice-selector-mini {
            background: var(--bg-surface);
            border: 1px solid var(--border-dark);
            border-radius: 30px;
            padding: 0.3rem 1rem;
            font-size: 0.85rem;
            color: var(--text-primary);
            margin-right: 0.3rem;
        }

        .hidden {
            display: none !important;
        }

        .loading-indicator {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            color: var(--accent);
            background: var(--bg-surface);
            padding: 0.8rem 1.5rem;
            border-radius: 40px;
            border: 1px solid var(--border-dark);
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid var(--accent-soft);
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 700px) {
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>
    <!-- Sidebar (collapsible) - collapsed by default -->
    <aside class="sidebar collapsed" id="sidebar">
        <div class="sidebar-header">
            <h3>History</h3>
            <button class="new-chat-btn" id="newChatBtn">➕ New Chat</button>
        </div>
        <div id="historyList" class="history-list">
            <!-- filled by js -->
        </div>
    </aside>

    <!-- Main chat area -->
    <main class="main-area">
        <div class="chat-header">
            <div style="display: flex; align-items: center; gap: 0.5rem;">
                <!-- Hamburger icon to toggle sidebar -->
                <div class="hamburger" id="hamburgerBtn">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <h2>ChadGPT</h2><br>
            </div>
            <div class="header-controls">
                <div class="mode-switch">
                    <button id="modeText" class="mode-btn active">💬 Text</button>
                    <button id="modeAudio" class="mode-btn">🔊 Audio</button>
                </div>
            </div>
        </div>

        <!-- conversation messages (current chat) -->
        <div id="conversation" class="conversation">
            <!-- messages appear here -->
        </div>

        <!-- input row + voice selector -->
        <div class="input-row">
            <div class="input-container">
                <textarea id="promptInput" rows="1" placeholder="Message... (Shift+Enter new line)"></textarea>
                
                <!-- voice selector (audio mode only) -->
                <select id="voiceSelectMini" class="voice-selector-mini hidden">
                    <option value="nova">Nova</option>
                    <option value="alloy">Alloy</option>
                    <option value="echo">Echo</option>
                    <option value="fable">Fable</option>
                    <option value="onyx">Onyx</option>
                    <option value="shimmer">Shimmer</option>
                </select>

                <button class="send-btn" id="sendButton" aria-label="send">➤</button>
            </div>
        </div>
        <footer style="text-align: center; padding: 0.5rem; font-size: 0.7rem; color: var(--text-muted); border-top: 1px solid var(--border-dark);">
    Created By <a href="https://sawwqib.vercel.app" style="color: #abafba; text-decoration: none;">Saqib</a>
</footer>
